<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Apps úteis na Itália · Guia dos Ursinhos</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/apps.css">
</head>

<body>

  <!-- HEADER dinâmico -->
  <script src="../js/header.js"></script>

  <main class="page-content fade-in">

    <h1 class="page-title">Apps úteis na Itália</h1>

    <p class="apps-intro">
      Aqui estão os aplicativos essenciais para se locomover, comprar passagens,
      entender rotas e aproveitar melhor sua viagem pela Itália.
    </p>

    <!-- CATEGORIAS -->
    <div class="apps-categories">
      <button class="category-btn" data-category="Transporte">Transporte</button>
      <button class="category-btn" data-category="Alimentação">Alimentação</button>
      <button class="category-btn" data-category="Utilidades">Utilidades</button>
      <button class="category-btn" data-category="Lojas">Lojas</button>
    </div>

    <!-- TÍTULO DA CATEGORIA ATUAL -->
    <h2 id="categoria-atual" class="categoria-atual">Todos os apps</h2>

    <!-- LISTA DE APPS (gerada via JS) -->
    <div id="apps-list" class="apps-container"></div>

  </main>

  <!-- FOOTER dinâmico -->
  <script src="../js/footer.js"></script>

  <!-- JS da página -->
  <script src="../js/apps.js"></script>

</body>
</html>
